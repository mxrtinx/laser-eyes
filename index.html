<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Laser Eyes | Perfil Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

        :root {
            --btc-orange: #f2a900;
            --btc-orange-glow: rgba(242, 169, 0, 0.6);
            --bg-dark: #050507;
            --card-bg: rgba(20, 20, 25, 0.9);
            --text-main: #f4f4f5;
            --text-dim: #a1a1aa;
            --border-color: rgba(63, 63, 70, 0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; padding: 40px 20px;
            position: relative;
        }

        /* Fondo de red */
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(to right, rgba(40,40,50,0.3) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(40,40,50,0.3) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(circle at 50% 50%, black, transparent 90%);
            z-index: -1;
        }

        h1 { 
            font-size: 3rem; font-weight: 800; letter-spacing: -2px;
            background: linear-gradient(135deg, #fff 40%, var(--btc-orange));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 15px var(--btc-orange-glow));
        }

        .card { 
            width: 100%; max-width: 600px; 
            background: var(--card-bg); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 40px; border-radius: 30px; 
            border: 1px solid var(--border-color);
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.7);
        }

        .canvas-container { 
            position: relative; margin-bottom: 20px; 
            border-radius: 20px; overflow: hidden; 
            background: #000; border: 1px solid var(--border-color);
        }
        canvas { width: 100%; display: block; cursor: crosshair; }

        .btn { 
            background: var(--btc-orange); color: #000; border: none; 
            padding: 18px; border-radius: 16px; font-weight: 700; 
            width: 100%; cursor: pointer; font-size: 1rem; margin: 8px 0; 
            transition: all 0.3s ease; text-transform: uppercase;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 0 20px var(--btc-orange-glow); }
        .btn-alt { background: transparent; color: var(--text-main); border: 1px solid #3f3f46; }

        /* SECCIÓN DE DONACIÓN CORREGIDA Y CENTRADA */
        .donation-box {
            margin-top: 30px; padding: 25px; 
            background: rgba(0,0,0,0.4); border-radius: 24px; 
            border: 1px solid var(--border-color);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        #qr-wrap { 
            background: white; padding: 12px; border-radius: 16px; 
            margin: 20px 0; display: inline-flex; align-items: center; justify-content: center;
        }
        
        #qr-wrap img { display: block; }

        .email-tag {
            font-family: 'Inter', monospace; color: var(--btc-orange); font-size: 0.85rem; 
            background: rgba(242, 169, 0, 0.1); padding: 8px 15px; border-radius: 8px;
            border: 1px solid rgba(242, 169, 0, 0.2);
        }

        #step-2, #step-3 { display: none; }
    </style>
</head>
<body>

    <h1>₿ LASER EYES</h1>

    <div class="card">
        <div id="step-1">
            <div style="border: 2px dashed #3f3f46; padding: 50px; border-radius: 24px; text-align: center; cursor: pointer;" onclick="document.getElementById('up').click()">
                <div style="font-size: 3rem; margin-bottom: 15px;">📸</div>
                <p>Haz clic para subir tu foto</p>
                <input type="file" id="up" accept="image/*" style="display:none">
            </div>
        </div>

        <div id="step-2">
            <div class="canvas-container"><canvas id="cvs"></canvas></div>
            <p style="color: var(--btc-orange); text-align: center; margin-bottom: 15px; font-weight: 600;">⚡ Toca los ojos para activarlos</p>
            <button class="btn" onclick="irAFinalizar()">GENERAR IMAGEN</button>
            <button class="btn btn-alt" onclick="reset()">REPETIR</button>
        </div>

        <div id="step-3">
            <h2 style="text-align: center; margin-bottom: 20px;">¡Foto Lista! 🚀</h2>
            <button class="btn" style="background: #10b981; color: white;" onclick="descargar()">⬇️ DESCARGAR IMAGEN</button>
            
            <div class="donation-box">
                <p style="font-weight: 700; font-size: 1rem;">Apoya al autor de la página</p>
                <p style="font-size: 0.8rem; color: var(--text-dim); margin-top: 5px; text-align: center;">
                    El 50% de las donaciones irán destinadas a proyectos <strong style="color:#fff">Open Source</strong>.
                </p>
                
                <div id="qr-wrap"></div>
                
                <div class="email-tag">kakhan@coinos.io</div>
            </div>

            <button class="btn btn-alt" style="margin-top: 20px;" onclick="location.reload()">NUEVA FOTO</button>
        </div>
    </div>

<script>
    const LN_ADDR = 'kakhan@coinos.io';
    const cvs = document.getElementById('cvs');
    const ctx = cvs.getContext('2d');
    let imgBase = null, lasers = [];

    document.getElementById('up').onchange = e => {
        const file = e.target.files[0];
        if(!file) return;
        const r = new FileReader();
        r.onload = ev => {
            imgBase = new Image();
            imgBase.onload = () => {
                const maxW = 1000;
                cvs.width = Math.min(imgBase.width, maxW);
                cvs.height = cvs.width / (imgBase.width / imgBase.height);
                dibujar();
                document.getElementById('step-1').style.display = 'none';
                document.getElementById('step-2').style.display = 'block';
            };
            imgBase.src = ev.target.result;
        };
        r.readAsDataURL(file);
    };

    cvs.onclick = e => {
        const rect = cvs.getBoundingClientRect();
        lasers.push({
            x: (e.clientX - rect.left) * (cvs.width / rect.width),
            y: (e.clientY - rect.top) * (cvs.height / rect.height)
        });
        dibujar();
    };

    function dibujar() {
        ctx.drawImage(imgBase, 0, 0, cvs.width, cvs.height);
        lasers.forEach(l => {
            ctx.save();
            ctx.globalCompositeOperation = 'screen';
            let size = cvs.width * 0.08;
            let g = ctx.createRadialGradient(l.x, l.y, 0, l.x, l.y, size);
            g.addColorStop(0, '#fff'); g.addColorStop(0.3, '#f2a900'); g.addColorStop(1, 'transparent');
            ctx.fillStyle = g; ctx.beginPath(); ctx.arc(l.x, l.y, size, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        });
    }

    function reset() { lasers = []; dibujar(); }

    function irAFinalizar() {
        document.getElementById('step-2').style.display = 'none';
        document.getElementById('step-3').style.display = 'block';
        const qrContainer = document.getElementById('qr-wrap');
        qrContainer.innerHTML = ''; // Limpiar previo
        new QRCode(qrContainer, { text: `lightning:${LN_ADDR}`, width: 180, height: 180 });
    }

    function descargar() {
        const a = document.createElement('a');
        a.download = 'laser-eyes.png';
        a.href = cvs.toDataURL('image/png', 1.0);
        a.click();
    }
</script>
</body>
</html>
