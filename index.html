<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Laser Eyes | Custom Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* Variables de color Bitcoin */
        :root {
            --btc-orange: #f2a900;
            --btc-glow: rgba(242, 169, 0, 0.5);
            --bg-dark: #0a0a0c;
            --card-bg: #16161a;
            --text-main: #e0e0e0;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: var(--bg-dark); 
            background-image: radial-gradient(circle at 50% 0%, #1a1a2e 0%, var(--bg-dark) 100%);
            color: var(--text-main); 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; padding: 40px 20px; 
        }

        /* Título con resplandor */
        header { text-align: center; margin-bottom: 30px; }
        h1 { 
            font-size: 2.5rem; 
            color: var(--btc-orange); 
            letter-spacing: -1px;
            text-shadow: 0 0 20px var(--btc-glow);
            margin-bottom: 10px;
        }
        .tagline { color: var(--text-dim); font-size: 1rem; }

        /* Contenedor principal */
        .card { 
            width: 100%; 
            max-width: 550px; 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 24px; 
            border: 1px solid #2d2d35;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        /* El área de la foto */
        .canvas-container { 
            position: relative; 
            margin: 20px 0; 
            border-radius: 16px; 
            overflow: hidden; 
            border: 2px dashed #3f3f46;
            background: #000;
            transition: border 0.3s ease;
        }
        .canvas-container:hover { border-color: var(--btc-orange); }
        canvas { width: 100%; display: block; cursor: crosshair; }

        /* Botones modernos */
        .btn { 
            background: var(--btc-orange); 
            color: #000; 
            border: none; 
            padding: 16px 24px; 
            border-radius: 12px; 
            font-weight: 700; 
            width: 100%; 
            cursor: pointer; 
            font-size: 1rem; 
            margin: 8px 0; 
            transition: all 0.2s ease;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px var(--btc-glow); }
        .btn-alt { background: #27272a; color: var(--text-main); border: 1px solid #3f3f46; }
        .btn-alt:hover { background: #3f3f46; border-color: #52525b; }
        .btn-success { background: #10b981; color: white; }

        /* Paso de pago */
        #qr-wrap { 
            background: white; 
            padding: 15px; 
            border-radius: 16px; 
            display: inline-block; 
            margin: 20px 0;
            box-shadow: 0 0 30px rgba(255,255,255,0.1);
        }
        .address-tag {
            background: #000;
            padding: 8px 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.9rem;
            color: var(--btc-orange);
            margin-top: 10px;
        }

        /* Animación de entrada */
        #step-2, #step-3 { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #step-2, #step-3 { display: none; }
    </style>
</head>
<body>

    <header>
        <h1>₿ LASER EYES</h1>
        <p class="tagline">Personaliza tu foto de perfil para la ciudadela</p>
    </header>

    <div class="card">
        <div id="step-1">
            <input type="file" id="up" accept="image/*" style="display:none">
            <button class="btn" onclick="document.getElementById('up').click()">
                <span>📷</span> SELECCIONAR FOTO
            </button>
            <p class="info" style="margin-top:15px; font-size: 0.8rem; color: var(--text-dim);">Formatos soportados: JPG, PNG, WEBP</p>
        </div>

        <div id="step-2">
            <div class="canvas-container">
                <canvas id="cvs"></canvas>
            </div>
            <p style="font-size:0.9rem; color:var(--btc-orange); margin-bottom: 15px;">✨ Toca sobre los ojos para activar los láseres</p>
            <button class="btn" onclick="irAFinalizar()">GENERAR DESCARGA</button>
            <button class="btn btn-alt" onclick="reset()">LIMPIAR LIENZO</button>
        </div>

        <div id="step-3">
            <button class="btn btn-success" onclick="descargar()">⬇️ DESCARGAR IMAGEN</button>
            
            <div style="margin-top: 40px; padding-top: 20px; border-top: 1px solid #2d2d35;">
                <p style="font-weight: 600; margin-bottom: 5px;">¿Te gusta el generador?</p>
                <p class="info" style="font-size: 0.85rem; margin-bottom: 15px;">Apoya el desarrollo con un aporte voluntario</p>
                <div id="qr-wrap"></div>
                <div class="address-tag">kakhan@coinos.io</div>
            </div>

            <button class="btn btn-alt" style="margin-top: 25px;" onclick="location.reload()">VOLVER A EMPEZAR</button>
        </div>
    </div>

<script>
    const LN_ADDR = 'kakhan@coinos.io';
    const cvs = document.getElementById('cvs');
    const ctx = cvs.getContext('2d');
    let imgBase = null, lasers = [];

    document.getElementById('up').onchange = e => {
        const r = new FileReader();
        r.onload = ev => {
            imgBase = new Image();
            imgBase.onload = () => {
                // Escalar imagen para que no rompa el diseño
                const maxW = 1200;
                const ratio = imgBase.width / imgBase.height;
                cvs.width = Math.min(imgBase.width, maxW);
                cvs.height = cvs.width / ratio;
                
                dibujar();
                document.getElementById('step-1').style.display = 'none';
                document.getElementById('step-2').style.display = 'block';
            };
            imgBase.src = ev.target.result;
        };
        r.readAsDataURL(e.target.files[0]);
    };

    cvs.onclick = e => {
        const rect = cvs.getBoundingClientRect();
        lasers.push({
            x: (e.clientX - rect.left) * (cvs.width / rect.width),
            y: (e.clientY - rect.top) * (cvs.height / rect.height)
        });
        dibujar();
    };

    function dibujar() {
        ctx.drawImage(imgBase, 0, 0, cvs.width, cvs.height);
        lasers.forEach(l => {
            ctx.save();
            ctx.globalCompositeOperation = 'screen';
            // Efecto de resplandor naranja pro
            let g = ctx.createRadialGradient(l.x, l.y, 0, l.x, l.y, cvs.width * 0.06);
            g.addColorStop(0, '#fff'); 
            g.addColorStop(0.2, '#f2a900'); 
            g.addColorStop(0.5, '#ff4d00');
            g.addColorStop(1, 'transparent');
            ctx.fillStyle = g; 
            ctx.beginPath(); 
            ctx.arc(l.x, l.y, cvs.width * 0.06, 0, Math.PI*2); 
            ctx.fill();
            ctx.restore();
        });
    }

    function reset() { lasers = []; dibujar(); }

    function irAFinalizar() {
        document.getElementById('step-2').style.display = 'none';
        document.getElementById('step-3').style.display = 'block';
        new QRCode(document.getElementById('qr-wrap'), { 
            text: `lightning:${LN_ADDR}`, 
            width: 180, 
            height: 180,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.M
        });
    }

    function descargar() {
        const a = document.createElement('a');
        a.download = 'bitcoin-laser-eyes.png';
        a.href = cvs.toDataURL('image/png');
        a.click();
    }
</script>
</body>
</html>
